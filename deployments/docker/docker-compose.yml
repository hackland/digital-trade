version: "3.9"

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: ${DB_PASSWORD:-trader123}
      POSTGRES_DB: btc_trader
    ports:
      - "5432:5432"
    volumes:
      - tsdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader"]
      interval: 5s
      timeout: 5s
      retries: 5

  trader:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      - CONFIG_PATH=/app/config.yaml
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY}
      - DB_DSN=postgres://trader:${DB_PASSWORD:-trader123}@timescaledb:5432/btc_trader?sslmode=disable
    ports:
      - "9090:9090"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped

volumes:
  tsdb_data:
